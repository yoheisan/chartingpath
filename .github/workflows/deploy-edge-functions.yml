name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check functions directory
        run: |
          echo "Checking for functions directory..."
          ls -la supabase/ || echo "No supabase directory found"
          ls -la supabase/functions/ || echo "No functions directory found"

      - name: Deploy edge functions
        run: |
          supabase functions deploy --project-ref dgznlsckoamseqcpzfqm
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        // Many static hosts serve 404.html for unknown routes (including deep links like /auth).
        // Redirect back to the SPA root and forward the original path so the app can rehydrate routing.
        var target =
          window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(
          "/?__lovable_path=" + encodeURIComponent(target)
        );
      })();
    </script>
  </head>
  <body></body>
</html>
